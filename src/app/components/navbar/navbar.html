<div class="flex relative justify-center w-screen h-18 bg-zinc-900">
  <div class="w-full md:w-11/12 justify-between flex items-center">
    <div class="pl-8">
      <span class="text-2xl">RewTo</span>
    </div>
    <div class="hidden md:flex items-center">
      <ul class="">
        @for(link of links; track $index ){
          <li class="inline-block mr-4">
            <a routerLink="{{link.href}}" class="text-white">{{link.name}}</a>
          </li>
        }
      </ul>
      <div class="flex items-center ml-4 gap-5">
        <span class="pi pi-user cursor-pointer"></span>
        <span class="pi pi-shopping-cart cursort-pointer"></span>
      </div>
    </div>
    <div class="flex items-center md:hidden pr-8">
      <div class="cursor-pointer" (click)="openNavbar = !openNavbar" >
        <span class="pi pi-bars text-white"></span>
      </div>
    </div>
  </div>
</div>
  @if(openNavbar){
    <div class="absolute top-18 z-2 left-0 w-full bg-zinc-800 h-auto flex flex-col">
      @for(link of links; track $index ){
        <a [routerLink]="link.href" class="w-full h-full py-5 pl-8 hover:bg-zinc-700">
            <span class="text-white flex text-lg">{{link.name}}</span>
        </a>
      }
    </div>
  }
